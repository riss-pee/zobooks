name: digibuks
description: "DigiBuks - Mizoram's Digital eBook Ecosystem"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management & Routing
  get: ^4.6.6

  # Network & API
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # Storage & Security
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1

  # UI & Design
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0

  # PDF & eBook Reader
  syncfusion_flutter_pdfviewer: ^32.1.21
  epubx: ^4.0.0

  # Image Picker & File Handling
  image_picker: ^1.0.7
  file_picker: ^10.3.8
  permission_handler: ^11.1.0

  # Payment Integration
  razorpay_flutter: ^1.4.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.2.1
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  package_info_plus: ^8.0.0

  # Localization
  get_storage: ^2.1.1

  # Logging & Debugging
  logger: ^2.0.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  # Custom Fonts (Mizo language support)
  # Commented out until font files are added
  # fonts:
  #   - family: Mizo
  #     fonts:
  #       - asset: assets/fonts/Mizo-Regular.ttf
  #       - asset: assets/fonts/Mizo-Bold.ttf
  #         weight: 700
